jetbrains_toolbox_release_api_url: "https://data.services.jetbrains.com/products/releases?code=TBA&latest=true&type=release"
jetbrains_toolbox_install_dir: "{{ lookup('ansible.builtin.env', 'HOME') }}/.local/share/JetBrains/Toolbox"
jetbrains_toolbox_bin_dir: "{{ lookup('ansible.builtin.env', 'HOME') }}/.local/bin"
jetbrains_toolbox_archive_path: "/tmp/jetbrains-toolbox.tar.gz"

tauri_development_enabled: false

tauri_development_packages:
  - webkit2gtk4.1-devel
  - webkitgtk6.0-devel
  - javascriptcoregtk4.1-devel
  - openssl-devel
  - gtk3-devel
  - libsoup3-devel
  - libappindicator-gtk3-devel
  - librsvg2-devel
  - libxdo-devel
  - pkgconf-pkg-config
  - file

flatpaks:
  - md.obsidian.Obsidian
  - com.spotify.Client
  - io.github.zen_browser.zen
  - org.telegram.desktop
  - com.github.johnfactotum.Foliate
  - com.mattjakeman.ExtensionManager
  - net.davidotek.pupgui2

unwanted_jetbrains_flatpaks:
  - com.jetbrains.RustRover
  - com.jetbrains.IntelliJ-IDEA-Ultimate

unwanted_steam_flatpaks:
  - com.valvesoftware.Steam

unwanted_packages:
  - rhythmbox

validation_rpm_packages:
  - tailscale
  - akmod-nvidia
  - xorg-x11-drv-nvidia-cuda
