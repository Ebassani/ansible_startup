  - unzip
  - wget
  - curl
  - htop
  - btop
  - fastfetch
  - lm_sensors
  - nvtop
  - libva-utils

laptop_packages:
  - switcheroo-control
  - upower
  - powertop
  - tuned
  - tuned-ppd
  - mokutil

network_packages:
  - tailscale

nvidia_packages:
  - kernel-devel-matched
  - akmod-nvidia
  - xorg-x11-drv-nvidia-cuda
  - xorg-x11-drv-nvidia-power
  - nvidia-settings
  - libva-nvidia-driver
